services:
  db:
    image: postgres:16-alpine
    container_name: farmcore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-farmcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-farmcore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farmcore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmcore-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-farmcore}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-farmcore}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
