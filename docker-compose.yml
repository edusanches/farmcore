services:
  db:
    image: postgres:16-alpine
    container_name: farmcore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: farmcore
      POSTGRES_PASSWORD: farmcore_dev
      POSTGRES_DB: farmcore
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmcore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
